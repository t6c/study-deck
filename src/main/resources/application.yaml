spring:
  application:
    name: study-deck
  datasource:
    url: ${DB_URL:jdbc:h2:mem:studydeck;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    jwt:
      secret: ${JWT_SECRET:study-deck-local-development-secret-change-before-production}
      expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
